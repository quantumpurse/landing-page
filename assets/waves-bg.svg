<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="none">
	<defs>
		<!-- Silk ribbon fill: violet-blue translucent body -->
		<linearGradient id="silk-fill-1" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
			<stop offset="20%" stop-color="#7c3aed" stop-opacity="0.06"/>
			<stop offset="50%" stop-color="#4f46e5" stop-opacity="0.08"/>
			<stop offset="80%" stop-color="#06b6d4" stop-opacity="0.05"/>
			<stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="silk-fill-2" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
			<stop offset="25%" stop-color="#4f46e5" stop-opacity="0.05"/>
			<stop offset="55%" stop-color="#7c3aed" stop-opacity="0.07"/>
			<stop offset="85%" stop-color="#06b6d4" stop-opacity="0.04"/>
			<stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="silk-fill-3" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#4f46e5" stop-opacity="0"/>
			<stop offset="30%" stop-color="#06b6d4" stop-opacity="0.04"/>
			<stop offset="60%" stop-color="#7c3aed" stop-opacity="0.06"/>
			<stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
		</linearGradient>

		<!-- Glowing edge strokes: gold/amber hot edges -->
		<linearGradient id="edge-glow-1" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#d97706" stop-opacity="0"/>
			<stop offset="15%" stop-color="#f59e0b" stop-opacity="0.2"/>
			<stop offset="40%" stop-color="#d97706" stop-opacity="0.25"/>
			<stop offset="60%" stop-color="#c084fc" stop-opacity="0.18"/>
			<stop offset="85%" stop-color="#f59e0b" stop-opacity="0.15"/>
			<stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="edge-glow-2" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
			<stop offset="20%" stop-color="#d97706" stop-opacity="0.15"/>
			<stop offset="50%" stop-color="#f59e0b" stop-opacity="0.22"/>
			<stop offset="75%" stop-color="#c084fc" stop-opacity="0.12"/>
			<stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
		</linearGradient>
		<linearGradient id="edge-glow-3" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
			<stop offset="30%" stop-color="#c084fc" stop-opacity="0.12"/>
			<stop offset="55%" stop-color="#d97706" stop-opacity="0.18"/>
			<stop offset="80%" stop-color="#f59e0b" stop-opacity="0.1"/>
			<stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
		</linearGradient>

		<!-- Soft glow filter for the edge strokes -->
		<filter id="silk-glow" x="-5%" y="-20%" width="110%" height="140%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
			<feMerge>
				<feMergeNode in="blur"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>

		<!-- Faint sparkle filter -->
		<filter id="sparkle" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
		</filter>
	</defs>

	<!-- Ribbon 1: Primary silk wave — wide, sweeping, front layer -->
	<path d="M-100,440 C100,380 280,520 480,450 C680,380 800,500 1000,440 C1200,380 1300,480 1540,430"
		  fill="none" stroke="url(#silk-fill-1)" stroke-width="60" stroke-linecap="round"/>
	<path d="M-100,440 C100,380 280,520 480,450 C680,380 800,500 1000,440 C1200,380 1300,480 1540,430"
		  fill="none" stroke="url(#edge-glow-1)" stroke-width="1.5" stroke-linecap="round" filter="url(#silk-glow)"/>

	<!-- Ribbon 2: Secondary wave — offset, slightly behind -->
	<path d="M-80,500 C150,440 320,560 520,500 C720,440 880,540 1080,490 C1280,440 1380,520 1540,490"
		  fill="none" stroke="url(#silk-fill-2)" stroke-width="50" stroke-linecap="round"/>
	<path d="M-80,500 C150,440 320,560 520,500 C720,440 880,540 1080,490 C1280,440 1380,520 1540,490"
		  fill="none" stroke="url(#edge-glow-2)" stroke-width="1.2" stroke-linecap="round" filter="url(#silk-glow)"/>

	<!-- Ribbon 3: Tertiary wave — deeper, more subtle -->
	<path d="M-60,560 C180,510 340,600 540,555 C740,510 900,590 1100,555 C1300,520 1400,570 1540,550"
		  fill="none" stroke="url(#silk-fill-3)" stroke-width="40" stroke-linecap="round"/>
	<path d="M-60,560 C180,510 340,600 540,555 C740,510 900,590 1100,555 C1300,520 1400,570 1540,550"
		  fill="none" stroke="url(#edge-glow-3)" stroke-width="0.8" stroke-linecap="round" filter="url(#silk-glow)"/>

	<!-- Sparkle particles — tiny dots scattered near wave peaks -->
	<g filter="url(#sparkle)">
		<circle cx="320" cy="445" r="1.5" fill="#f59e0b" fill-opacity="0.2"/>
		<circle cx="680" cy="395" r="1" fill="#c084fc" fill-opacity="0.15"/>
		<circle cx="1000" cy="430" r="1.2" fill="#f59e0b" fill-opacity="0.18"/>
		<circle cx="480" cy="460" r="0.8" fill="#06b6d4" fill-opacity="0.12"/>
		<circle cx="880" cy="500" r="1.3" fill="#f59e0b" fill-opacity="0.15"/>
		<circle cx="1200" cy="445" r="1" fill="#c084fc" fill-opacity="0.2"/>
		<circle cx="200" cy="490" r="0.9" fill="#d97706" fill-opacity="0.12"/>
		<circle cx="600" cy="520" r="1.1" fill="#06b6d4" fill-opacity="0.1"/>
		<circle cx="1100" cy="540" r="0.8" fill="#f59e0b" fill-opacity="0.14"/>
		<circle cx="400" cy="555" r="1" fill="#c084fc" fill-opacity="0.1"/>
	</g>
</svg>
